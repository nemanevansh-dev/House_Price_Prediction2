<!DOCTYPE html>
<html>
<head>
    <title>Loan Default Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Loan Default Prediction</h1>
        <form method="POST">
            <div class="form-group">
                <label>Gender:</label>
                <select name="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Age:</label>
                <input type="number" name="age" min="18" max="65" required>
            </div>

            <div class="form-group">
                <label>Income (₹):</label>
                <input type="number" name="income" min="20000" max="200000" required>
            </div>

            <div class="form-group">
                <label>Loan Amount (₹):</label>
                <input type="number" name="loan_amt" min="5000" max="100000" required>
            </div>

            <div class="form-group">
                <label>Loan Term (months):</label>
                <select name="loan_term" required>
                    <option value="12">12 months</option>
                    <option value="24">24 months</option>
                    <option value="36">36 months</option>
                    <option value="48">48 months</option>
                    <option value="60">60 months</option>
                </select>
            </div>

            <div class="form-group">
                <label>Credit Score:</label>
                <input type="number" name="credit_score" min="300" max="850" required>
            </div>

            <div class="form-group">
                <label>Employment Status:</label>
                <select name="emp_status" required>
                    <option value="2">Employed</option>
                    <option value="1">Self-Employed</option>
                    <option value="0">Unemployed</option>
                </select>
            </div>

            <div class="form-group">
                <label>Marital Status:</label>
                <select name="marital_status" required>
                    <option value="1">Married</option>
                    <option value="0">Single</option>
                    <option value="2">Divorced</option>
                </select>
            </div>

            <div class="form-group">
                <label>Previous Defaults:</label>
                <input type="number" name="prev_defaults" min="0" max="5" required>
            </div>

            <button type="submit">Predict Loan Default</button>
        </form>
    </div>
</body>
</html>
